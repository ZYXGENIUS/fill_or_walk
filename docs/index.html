<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>加油经济指数 | Fill or Walk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="noise"></div>
    <main class="page">
      <header class="hero reveal">
        <p class="kicker">Fill or Walk</p>
        <h1>加油经济指数</h1>
        <p id="updatedAt" class="subtitle">正在加载最新数据...</p>
        <p id="historyHint" class="history-hint"></p>
      </header>

      <section class="decision-card reveal delay-1">
        <div>
          <p class="label">决策建议</p>
          <p id="decisionTag" class="decision">--</p>
          <p id="decisionText" class="hint">正在读取指数解释...</p>
        </div>
        <div class="index-wrap">
          <p class="label">划算指数</p>
          <p id="bargainIndex" class="index">--</p>
        </div>
      </section>

      <section class="stats reveal delay-2">
        <article class="stat-card">
          <p class="label">今日 92#</p>
          <p id="todayPrice" class="value">--</p>
        </article>
        <article class="stat-card">
          <p class="label">年内价格分位</p>
          <p id="pricePercentile" class="value">--</p>
          <div class="percentile-progress" aria-hidden="true">
            <div class="percentile-progress-track">
              <div id="barPricePercentile" class="percentile-progress-mask"></div>
            </div>
          </div>
        </article>
        <article class="stat-card">
          <p class="label">样本天数</p>
          <p id="sampleSize" class="value">--</p>
        </article>
      </section>

      <section class="stats period-stats reveal delay-3">
        <article class="stat-card period-card">
          <p class="label">过去 30 天分位</p>
          <p id="pricePercentile30d" class="value">--</p>
          <div class="percentile-progress" aria-hidden="true">
            <div class="percentile-progress-track">
              <div id="barPricePercentile30d" class="percentile-progress-mask"></div>
            </div>
          </div>
        </article>
        <article class="stat-card period-card">
          <p class="label">本月分位</p>
          <p id="pricePercentileMonth" class="value">--</p>
          <div class="percentile-progress" aria-hidden="true">
            <div class="percentile-progress-track">
              <div id="barPricePercentileMonth" class="percentile-progress-mask"></div>
            </div>
          </div>
        </article>
        <article class="stat-card period-card">
          <p class="label">本季度分位</p>
          <p id="pricePercentileQuarter" class="value">--</p>
          <div class="percentile-progress" aria-hidden="true">
            <div class="percentile-progress-track">
              <div id="barPricePercentileQuarter" class="percentile-progress-mask"></div>
            </div>
          </div>
        </article>
        <article class="stat-card period-card">
          <p class="label">过去 120 天分位</p>
          <p id="pricePercentile120d" class="value">--</p>
          <div class="percentile-progress" aria-hidden="true">
            <div class="percentile-progress-track">
              <div id="barPricePercentile120d" class="percentile-progress-mask"></div>
            </div>
          </div>
        </article>
      </section>

      <section class="chart-card reveal delay-4">
        <div class="section-title-row">
          <h2>近 365 天基准走势</h2>
        </div>
        <p id="chartHint" class="chart-hint"></p>
        <div class="chart-viewport">
          <canvas id="priceChart" aria-label="fuel price trend" role="img"></canvas>
        </div>
      </section>

      <section class="tail-card reveal delay-5">
        <h2>最近 7 天快照</h2>
        <ul id="tailList"></ul>
      </section>
    </main>
  </body>
</html>
